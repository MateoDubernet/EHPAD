version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ehpad_project
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "80:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=ehpad_project
      - DB_USER=root
      - DB_PASS=root
      - DB_PORT=3306
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
    depends_on:
      db:
        condition: service_healthy